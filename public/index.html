<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GemstonesHub Control Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-zinc-900 border border-zinc-800 rounded-2xl p-6 shadow-2xl space-y-6">
        <div class="text-center space-y-1">
            <h1 class="text-2xl font-black tracking-wider text-amber-500 uppercase">GemstonesHub</h1>
            <p class="text-sm text-zinc-400">Multi-User Account Web Controller</p>
        </div>

        <div class="space-y-4">
            <div>
                <label for="username" class="block text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-2">Target Username Roblox</label>
                <input type="text" id="username" placeholder="Masukkan nama bot/akun" 
                    class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-3 text-zinc-200 placeholder-zinc-600 focus:outline-none focus:border-amber-500 transition-colors">
            </div>

            <button onclick="sendRespawn()" 
                class="w-full bg-red-600 hover:bg-red-700 active:bg-red-800 text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-red-900/20 transition-all transform active:scale-[0.98]">
                🔴 Trigger Respawn
            </button>
        </div>

        <div id="status" class="text-center text-sm font-medium min-h-[20px] hidden rounded-xl p-3"></div>
    </div>

    <script>
        async function sendRespawn() {
            const usernameInput = document.getElementById('username').value;
            const statusDiv = document.getElementById('status');
            
            if (!usernameInput) {
                showStatus("⚠️ Harap masukkan username terlebih dahulu!", "bg-amber-500/10 text-amber-500 border border-amber-500/20");
                return;
            }

            showStatus("Mengirim perintah ke server...", "bg-zinc-800 text-zinc-400");

            try {
                const response = await fetch('/api/respawn', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: usernameInput })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    showStatus(`✅ Perintah respawn sukses dikirim ke: ${usernameInput}`, "bg-emerald-500/10 text-emerald-400 border border-emerald-500/20");
                    document.getElementById('username').value = ""; 
                } else {
                    showStatus(`❌ Gagal: ${result.error}`, "bg-red-500/10 text-red-400 border border-red-500/20");
                }
            } catch (err) {
                showStatus("❌ Gagal menghubungi server backend.", "bg-red-500/10 text-red-400 border border-red-500/20");
            }
        }

        function showStatus(text, classes) {
            const statusDiv = document.getElementById('status');
            statusDiv.className = `text-center text-sm font-medium min-h-[20px] rounded-xl p-3 ${classes}`;
            statusDiv.innerText = text;
        }
    </script>
</body>
</html>
