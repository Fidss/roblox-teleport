<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GemstonesHub Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen p-6 font-sans">

    <div class="max-w-5xl mx-auto space-y-6">
        <div class="flex flex-col md:flex-row justify-between items-center bg-zinc-900 border border-zinc-800 rounded-2xl p-6 shadow-xl gap-4">
            <div>
                <h1 class="text-3xl font-black tracking-wider text-amber-500 uppercase">GemstonesHub</h1>
                <p class="text-sm text-zinc-400">Database Control Panel (Supabase)</p>
            </div>
            <div class="text-sm text-zinc-400 bg-zinc-950 px-4 py-2 rounded-xl border border-zinc-800">
                Auto-refresh: <span class="text-emerald-500 font-bold">ON</span>
            </div>
        </div>

        <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6 shadow-xl space-y-4">
            <h2 class="text-lg font-bold tracking-wide text-zinc-300">Daftar Akun Cloudphone:</h2>
            <div id="bots-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                <p class="text-zinc-500 text-sm italic col-span-full">Memuat data dari database...</p>
            </div>
        </div>
    </div>

    <script>
        // Kredensial Supabase Anda
        const supabaseUrl = 'https://kmyipabrhukygbashtwh.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtteWlwYWJyaHVreWdiYXNodHdoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0ODMyMTIsImV4cCI6MjA5ODA1OTIxMn0.EQC95fFG2xeM0Wy5UiG55bo1ftx8sA7gS1etoTmOym0';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function fetchBots() {
            try {
                const { data, error } = await supabase
                    .from('bots')
                    .select('*')
                    .order('last_seen', { ascending: false }); // Urutkan dari yang terbaru

                if (error) throw error;

                const container = document.getElementById('bots-container');
                
                if (data.length === 0) {
                    container.innerHTML = `<p class="text-zinc-500 text-sm italic col-span-full">Belum ada data bot terdaftar.</p>`;
                    return;
                }

                const now = new Date();
                
                container.innerHTML = data.map(bot => {
                    const lastSeen = new Date(bot.last_seen);
                    const diffSeconds = (now - lastSeen) / 1000;
                    // Jika bot belum update lebih dari 15 detik, anggap mati/offline
                    const isActive = diffSeconds < 15; 
                    
                    const statusUI = isActive 
                        ? `<span class="text-[10px] bg-emerald-500/10 text-emerald-400 px-2 py-0.5 rounded border border-emerald-500/20 uppercase font-bold">Aktif</span>`
                        : `<span class="text-[10px] bg-zinc-700/50 text-zinc-400 px-2 py-0.5 rounded border border-zinc-600 uppercase font-bold">Nonaktif</span>`;

                    const btnUI = isActive
                        ? `<button onclick="triggerRespawn('${bot.username}', this)" class="w-full bg-red-600 hover:bg-red-500 text-white font-bold text-xs py-2 px-3 rounded-lg transition-all shadow-md mt-2">🔴 Respawn</button>`
                        : `<button disabled class="w-full bg-zinc-800 text-zinc-500 font-bold text-xs py-2 px-3 rounded-lg cursor-not-allowed mt-2">Offline</button>`;

                    return `
                        <div class="bg-zinc-950 border border-zinc-800 rounded-xl p-4 flex flex-col justify-between shadow-inner">
                            <div class="flex items-center justify-between mb-2">
                                <span class="font-bold text-zinc-200 truncate pr-2">${bot.username}</span>
                                ${statusUI}
                            </div>
                            <div class="text-[10px] text-zinc-500 mb-2">Terakhir: ${lastSeen.toLocaleTimeString()}</div>
                            ${btnUI}
                        </div>
                    `;
                }).join('');

            } catch (err) {
                console.error("Gagal mengambil data:", err.message);
            }
        }

        async function triggerRespawn(username, btn) {
            const originalText = btn.innerText;
            btn.innerText = "Mengirim...";
            btn.disabled = true;

            try {
                // Update kolom 'command' menjadi 'respawn' di Supabase
                const { error } = await supabase
                    .from('bots')
                    .update({ command: 'respawn' })
                    .eq('username', username);

                if (error) throw error;

                btn.innerText = "✅ Perintah Terkirim";
                btn.className = "w-full bg-emerald-600 text-white font-bold text-xs py-2 px-3 rounded-lg transition-all mt-2";
                setTimeout(fetchBots, 1000);
            } catch (err) {
                alert("Gagal mengirim perintah: " + err.message);
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        // Auto-refresh setiap 3 detik
        setInterval(fetchBots, 3000);
        fetchBots();
    </script>
</body>
</html>
